<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Cookie Clicker – Ultimate Edition</title>
<meta name="theme-color" content="#13151a">
<style>
  :root {
    --bg: #0b0e14;
    --panel: #151921;
    --panel-border: rgba(255, 255, 255, 0.08);
    --primary: #ffd700; /* Gold */
    --accent: #64f3d5;  /* Cyan/Mint */
    --danger: #ff5f5f;
    --text-main: #edf2f7;
    --text-muted: #8b9bb4;
    --shadow: 0 8px 30px rgba(0,0,0,0.5);
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }

  body {
    margin: 0;
    font-family: var(--font);
    background-color: var(--bg);
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(100, 243, 213, 0.08), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(255, 215, 0, 0.05), transparent 25%);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden; /* Prevent scrolling body, utilize internal scrolling */
    display: flex;
    flex-direction: column;
  }

  /* --- HEADER --- */
  header {
    flex: 0 0 auto;
    background: rgba(11, 14, 20, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--panel-border);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .brand { font-weight: 800; letter-spacing: -0.5px; font-size: 1.1rem; }
  .brand span { color: var(--primary); }
  
  .stats-bar {
    display: flex;
    gap: 15px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .stat-pill {
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill.highlight { border-color: rgba(100, 243, 213, 0.3); color: var(--accent); }

  /* --- MAIN LAYOUT --- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr 340px;
    gap: 0; /* Gaps handled by padding */
    height: calc(100vh - 60px);
    overflow: hidden;
  }

  /* Generic Column Styles */
  .col {
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .col::-webkit-scrollbar { width: 6px; }
  .col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Left: Achievements & Info */
  .col-left { border-right: 1px solid var(--panel-border); background: rgba(0,0,0,0.1); }
  
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 16px;
  }
  h3 { margin: 0 0 12px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

  .stat-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; }
  .stat-row b { color: #fff; }

  .ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; }
  .ach-box {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 1.2rem;
    opacity: 0.3;
    transition: 0.3s;
    cursor: help;
  }
  .ach-box.unlocked { opacity: 1; background: rgba(100, 243, 213, 0.1); border-color: var(--accent); box-shadow: 0 0 10px rgba(100,243,213,0.2); }

  /* Center: The Game */
  .col-center {
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
  }

  .cookie-container {
    position: relative;
    display: grid;
    place-items: center;
  }
  
  /* The Cookie */
  #bigCookie {
    width: 260px; height: 260px;
    background: radial-gradient(circle at 30% 30%, #d4a373, #8d6e63);
    border-radius: 50%;
    position: relative;
    cursor: pointer;
    box-shadow: 
      inset 0 0 20px rgba(0,0,0,0.5),
      0 10px 40px rgba(0,0,0,0.4);
    transition: transform 0.05s ease;
    z-index: 5;
    /* Idle Animation */
    animation: breathe 3s ease-in-out infinite;
  }
  /* Chips */
  #bigCookie::before, #bigCookie::after {
    content: ''; position: absolute; background: #3e2723; border-radius: 50%;
    box-shadow: 40px -20px 0 2px #3e2723, -30px 40px 0 1px #3e2723, 50px 50px 0 0 #3e2723, -40px -30px 0 -1px #3e2723;
    width: 20px; height: 20px; top: 40%; left: 40%; opacity: 0.8;
  }
  
  #bigCookie:active { transform: scale(0.94); }
  #bigCookie:hover { box-shadow: 0 0 0 8px rgba(255,255,255,0.05), 0 10px 50px rgba(0,0,0,0.5); }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  .counter-wrap { text-align: center; margin-bottom: 30px; z-index: 5; }
  #cookieDisplay { font-size: 3.5rem; font-weight: 800; line-height: 1; text-shadow: 0 5px 20px rgba(0,0,0,0.5); }
  #cpsDisplay { font-size: 1.1rem; color: var(--text-muted); margin-top: 5px; font-weight: 500; }

  /* Particle Effects */
  .particle {
    position: absolute;
    font-weight: 800;
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
    z-index: 20;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
  }

  /* Golden Cookie */
  #goldenCookie {
    position: absolute;
    width: 60px; height: 60px;
    background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00;
    cursor: pointer;
    z-index: 100;
    display: none; /* Hidden by default */
    animation: spin 3s linear infinite;
  }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

  /* Right: Shop */
  .col-right { border-left: 1px solid var(--panel-border); background: rgba(0,0,0,0.2); }
  
  .shop-item {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    border-radius: 12px;
    padding: 12px;
    transition: 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  /* Affordable State */
  .shop-item.can-buy {
    border-color: rgba(95, 224, 138, 0.4);
    background: linear-gradient(90deg, rgba(95,224,138,0.05), transparent);
    cursor: pointer;
  }
  .shop-item.can-buy:active { transform: scale(0.98); background: rgba(95,224,138,0.1); }
  .shop-item.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

  .icon {
    width: 50px; height: 50px;
    background: #1a202c; border-radius: 8px;
    display: grid; place-items: center; font-size: 24px;
  }
  .info h4 { margin: 0; font-size: 1rem; }
  .info p { margin: 4px 0 0; font-size: 0.8rem; color: var(--accent); }
  .cost { font-weight: 700; color: var(--text-muted); font-size: 0.9rem; text-align: right; }
  .owned-badge {
    position: absolute; top: 0; right: 0;
    background: rgba(255,255,255,0.1); font-size: 0.7rem; padding: 2px 6px;
    border-bottom-left-radius: 8px; color: #fff;
  }

  /* Upgrade Button Special Style */
  .upgrade-item { background: linear-gradient(135deg, rgba(124,156,255,0.1), transparent); border: 1px solid rgba(124,156,255,0.2); }

  /* Controls Footer */
  .controls {
    display: flex; gap: 10px; margin-top: auto; padding-top: 20px;
  }
  .btn-mini {
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-muted);
    padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; flex: 1;
    transition: 0.2s;
  }
  .btn-mini:hover { border-color: #fff; color: #fff; }
  .btn-mini.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* Responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; height: auto; overflow: visible; }
    .col { padding: 15px; overflow: visible; height: auto; border: none; }
    .col-center { order: -1; padding: 40px 0; }
    body { height: auto; overflow-y: auto; }
    header { position: sticky; top: 0; }
  }
</style>
</head>
<body>

  <header>
    <div class="brand">🍪 CookieClicker <span>UE</span></div>
    <div class="stats-bar">
      <div class="stat-pill highlight" id="headerCps">0 /s</div>
      <div class="stat-pill">v2.0</div>
    </div>
  </header>

  <main>
    <div class="col col-left">
      <div class="panel">
        <h3>Statistiken</h3>
        <div class="stat-row"><span>Spielzeit</span> <b id="playtime">00:00</b></div>
        <div class="stat-row"><span>Gesamt gebacken</span> <b id="totalBaked">0</b></div>
        <div class="stat-row"><span>Hand-Klicks</span> <b id="totalClicks">0</b></div>
        <div class="stat-row"><span>Goldene Kekse</span> <b id="goldenClicks">0</b></div>
      </div>

      <div class="panel">
        <h3>Achievements</h3>
        <div class="ach-grid" id="achGrid">
          </div>
        <div id="achTooltip" style="font-size:12px; color:var(--text-muted); margin-top:10px; min-height:1.2em;">...</div>
      </div>
      
      <div class="controls">
        <button class="btn-mini" id="btnSound">Sound: Aus</button>
        <button class="btn-mini danger" id="btnReset">Reset</button>
      </div>
    </div>

    <div class="col col-center">
      <div class="counter-wrap">
        <div id="cookieDisplay">0</div>
        <div id="cpsDisplay">pro Sekunde: 0</div>
      </div>

      <div class="cookie-container">
        <div id="bigCookie"></div>
      </div>

      <div id="goldenCookie"></div>
    </div>

    <div class="col col-right" id="shopContainer">
      </div>
  </main>

<script>
/**
 * MRBRICK49 - COOKIE CLICKER ULTIMATE EDITION
 * Optimized Codebase: requestAnimationFrame, Separation of concerns, Dynamic DOM
 */

// --- CONFIG & STATE ---
const Game = {
  data: {
    cookies: 0,
    totalCookies: 0,
    clicks: 0,
    goldenClicks: 0,
    startTime: Date.now(),
    clickLevel: 1,
    buildings: {
      cursor:  { id:'cursor',  name:'Cursor',    baseCost: 15,     baseCps: 0.5,   owned: 0, icon:'👆' },
      grandma: { id:'grandma', name:'Oma',       baseCost: 100,    baseCps: 4,     owned: 0, icon:'👵' },
      farm:    { id:'farm',    name:'Farm',      baseCost: 1100,   baseCps: 12,    owned: 0, icon:'🌾' },
      mine:    { id:'mine',    name:'Mine',      baseCost: 12000,  baseCps: 45,    owned: 0, icon:'⛏️' },
      factory: { id:'factory', name:'Fabrik',    baseCost: 130000, baseCps: 150,   owned: 0, icon:'🏭' },
      bank:    { id:'bank',    name:'Bank',      baseCost: 1400000,baseCps: 600,   owned: 0, icon:'🏦' },
      temple:  { id:'temple',  name:'Tempel',    baseCost: 20000000,baseCps: 2500, owned: 0, icon:'🏛️' }
    },
    settings: { sound: false }
  },
  
  // Runtime variables (not saved)
  lastTick: Date.now(),
  cps: 0,
  goldenTimer: 0,
  
  init() {
    this.load();
    UI.init();
    this.loop();
    this.startAutoSave();
    this.calcCps();
  },

  loop() {
    const now = Date.now();
    const dt = (now - this.lastTick) / 1000; // Delta time in seconds
    
    if (dt > 0) {
      this.produce(dt);
      this.handleGoldenCookie(dt);
      this.lastTick = now;
    }

    UI.update();
    requestAnimationFrame(() => this.loop());
  },

  produce(dt) {
    const amount = this.cps * dt;
    this.data.cookies += amount;
    this.data.totalCookies += amount;
  },

  click() {
    const power = this.getClickPower();
    this.data.cookies += power;
    this.data.totalCookies += power;
    this.data.clicks++;
    AudioSys.play('click');
    return power;
  },

  getClickPower() {
    // Click power increases slightly with CPS to remain relevant
    return Math.floor(1 + this.data.clickLevel + (this.cps * 0.05));
  },

  getClickUpgradeCost() {
    return Math.floor(50 * Math.pow(1.6, this.data.clickLevel));
  },

  buyBuilding(id) {
    const b = this.data.buildings[id];
    const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
    if (this.data.cookies >= cost) {
      this.data.cookies -= cost;
      b.owned++;
      this.calcCps();
      AudioSys.play('buy');
    }
  },

  buyClickUpgrade() {
    const cost = this.getClickUpgradeCost();
    if (this.data.cookies >= cost) {
      this.data.cookies -= cost;
      this.data.clickLevel++;
      AudioSys.play('powerup');
    }
  },

  calcCps() {
    let cps = 0;
    for (let key in this.data.buildings) {
      const b = this.data.buildings[key];
      cps += b.owned * b.baseCps;
    }
    this.cps = cps;
  },

  handleGoldenCookie(dt) {
    // Random spawn logic: approx every 90 seconds
    if (document.getElementById('goldenCookie').style.display === 'block') return;

    this.goldenTimer += dt;
    if (this.goldenTimer > 60 && Math.random() < (0.005 * dt)) { 
      UI.spawnGolden();
      this.goldenTimer = 0;
    }
  },

  clickGolden() {
    const bonus = (this.cps * 60) + 1000; // Worth 1 minute of production + base
    this.data.cookies += bonus;
    this.data.totalCookies += bonus;
    this.data.goldenClicks++;
    AudioSys.play('chime');
    return bonus;
  },

  save() {
    localStorage.setItem('mrbrick49_save_v3', JSON.stringify(this.data));
  },

  load() {
    const raw = localStorage.getItem('mrbrick49_save_v3');
    if (raw) {
      try {
        const saved = JSON.parse(raw);
        // Merge deeply to avoid overwriting new structure with old
        this.data = { ...this.data, ...saved, buildings: { ...this.data.buildings } };
        
        // Restore individual building counts
        for(let key in saved.buildings) {
          if(this.data.buildings[key]) {
            this.data.buildings[key].owned = saved.buildings[key].owned;
          }
        }
        
        // Offline Calculation
        const secondsOffline = (Date.now() - this.data.lastSaveTime || Date.now()) / 1000;
        this.calcCps(); // Ensure CPS is correct before calculating offline
        if (secondsOffline > 10 && this.cps > 0) {
           const earned = this.cps * secondsOffline * 0.5; // 50% efficiency offline
           this.data.cookies += earned;
           this.data.totalCookies += earned;
           alert(`Willkommen zurück! Du hast offline ${Utils.format(earned)} Cookies verdient.`);
        }
      } catch (e) { console.error("Save corrupted", e); }
    }
  },

  startAutoSave() {
    setInterval(() => {
      this.data.lastSaveTime = Date.now();
      this.save();
    }, 5000);
  }
};

// --- UI MANAGER ---
const UI = {
  els: {},
  
  init() {
    // Cache DOM
    const ids = ['cookieDisplay','cpsDisplay','bigCookie','shopContainer',
                 'headerCps','playtime','totalBaked','totalClicks','goldenClicks',
                 'achGrid','achTooltip','btnSound','btnReset', 'goldenCookie'];
    ids.forEach(id => this.els[id] = document.getElementById(id));

    // Listeners
    this.els.bigCookie.addEventListener('mousedown', (e) => this.onCookieClick(e));
    this.els.bigCookie.addEventListener('touchstart', (e) => { e.preventDefault(); this.onCookieClick(e.changedTouches[0]); }, {passive:false});
    
    this.els.goldenCookie.addEventListener('click', (e) => {
      const bonus = Game.clickGolden();
      this.createParticles(e.clientX, e.clientY, `GOLD! +${Utils.format(bonus)}`, '#ffd700');
      this.els.goldenCookie.style.display = 'none';
    });

    this.els.shopContainer.addEventListener('click', (e) => {
      const item = e.target.closest('.shop-item');
      if (!item) return;
      if (item.classList.contains('locked')) return;
      
      const type = item.dataset.type;
      const id = item.dataset.id;
      
      if (type === 'building') Game.buyBuilding(id);
      else if (type === 'upgrade') Game.buyClickUpgrade();
    });

    this.els.btnSound.addEventListener('click', () => {
      Game.data.settings.sound = !Game.data.settings.sound;
      this.els.btnSound.textContent = `Sound: ${Game.data.settings.sound ? 'An' : 'Aus'}`;
    });

    this.els.btnReset.addEventListener('click', () => {
      if(confirm("Spielstand wirklich löschen?")) {
        localStorage.removeItem('mrbrick49_save_v3');
        location.reload();
      }
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        const rect = this.els.bigCookie.getBoundingClientRect();
        this.onCookieClick({ clientX: rect.left + rect.width/2, clientY: rect.top + rect.height/2 });
        this.els.bigCookie.style.transform = 'scale(0.95)';
        setTimeout(()=> this.els.bigCookie.style.transform = '', 50);
      }
    });

    this.renderShop();
    this.renderAchievments();
  },

  onCookieClick(e) {
    const added = Game.click();
    this.createParticles(e.clientX, e.clientY, `+${Utils.format(added)}`);
  },

  createParticles(x, y, text, color = '#fff') {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = color;
    // Add some randomness
    const randX = (Math.random() - 0.5) * 40;
    el.style.transform = `translate(${randX}px, 0)`;
    
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 950);
  },

  spawnGolden() {
    const g = this.els.goldenCookie;
    const maxX = window.innerWidth - 80;
    const maxY = window.innerHeight - 80;
    g.style.left = Math.max(20, Math.random() * maxX) + 'px';
    g.style.top = Math.max(80, Math.random() * maxY) + 'px';
    g.style.display = 'block';
    
    // Despawn after 15s
    setTimeout(() => { g.style.display = 'none'; }, 15000);
  },

  renderShop() {
    let html = '';
    
    // 1. Click Upgrade
    html += `
    <div class="shop-item upgrade-item" id="shop-upgrade" data-type="upgrade">
      <div class="icon">⚡</div>
      <div class="info">
        <h4>Klick Power</h4>
        <p>Aktuell: +${Game.getClickPower()}</p>
      </div>
      <div class="cost" id="cost-upgrade"></div>
    </div>`;

    // 2. Buildings
    for (let key in Game.data.buildings) {
      const b = Game.data.buildings[key];
      html += `
      <div class="shop-item" id="shop-${b.id}" data-type="building" data-id="${b.id}">
        <div class="owned-badge" id="count-${b.id}">${b.owned}</div>
        <div class="icon">${b.icon}</div>
        <div class="info">
          <h4>${b.name}</h4>
          <p>+${Utils.format(b.baseCps)}/s</p>
        </div>
        <div class="cost" id="cost-${b.id}"></div>
      </div>`;
    }
    this.els.shopContainer.innerHTML = html;
  },

  renderAchievments() {
    const achs = [
      { id:1, text:"100 Kekse", check: d => d.totalCookies >= 100 },
      { id:2, text:"1.000 Kekse", check: d => d.totalCookies >= 1000 },
      { id:3, text:"10k Kekse", check: d => d.totalCookies >= 10000 },
      { id:4, text:"100 Klicks", check: d => d.clicks >= 100 },
      { id:5, text:"Oma Bäckerei", check: d => d.buildings.grandma.owned >= 5 },
      { id:6, text:"Millionär", check: d => d.totalCookies >= 1000000 },
    ];
    // Simple render, efficient updates handled in loop
    this.els.achGrid.innerHTML = achs.map(a => `<div class="ach-box" id="ach-${a.id}" title="${a.text}">🏆</div>`).join('');
    this.achDefs = achs;
  },

  update() {
    // Counters
    this.els.cookieDisplay.textContent = Utils.format(Game.data.cookies);
    this.els.cpsDisplay.textContent = `pro Sekunde: ${Utils.format(Game.cps, 1)}`;
    this.els.headerCps.textContent = `${Utils.format(Game.cps, 1)} /s`;
    
    document.title = `${Utils.format(Game.data.cookies)} Cookies - UE`;

    // Stats
    const t = Math.floor((Date.now() - Game.data.startTime)/1000);
    this.els.playtime.textContent = `${Math.floor(t/3600)}h ${Math.floor((t%3600)/60)}m`;
    this.els.totalBaked.textContent = Utils.format(Math.floor(Game.data.totalCookies));
    this.els.totalClicks.textContent = Utils.format(Game.data.clicks);
    this.els.goldenClicks.textContent = Game.data.goldenClicks;

    // Shop States
    // Upgrade
    const upCost = Game.getClickUpgradeCost();
    const upEl = document.getElementById('shop-upgrade');
    document.getElementById('cost-upgrade').textContent = Utils.format(upCost);
    this.toggleBuyable(upEl, upCost);

    // Buildings
    for (let key in Game.data.buildings) {
      const b = Game.data.buildings[key];
      const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
      const el = document.getElementById(`shop-${b.id}`);
      
      document.getElementById(`cost-${b.id}`).textContent = Utils.format(cost);
      document.getElementById(`count-${b.id}`).textContent = b.owned;
      this.toggleBuyable(el, cost);
    }

    // Achievements
    this.achDefs.forEach(a => {
      if(a.check(Game.data)) {
        document.getElementById(`ach-${a.id}`).classList.add('unlocked');
      }
    });
  },

  toggleBuyable(el, cost) {
    if (Game.data.cookies >= cost) {
      el.classList.add('can-buy');
      el.classList.remove('locked');
    } else {
      el.classList.remove('can-buy');
      el.classList.add('locked');
    }
  }
};

// --- UTILS & AUDIO ---
const Utils = {
  format(num, decimals = 0) {
    if (num < 1000) return Math.floor(num);
    const units = ['k','M','B','T','q','Q'];
    let unitIndex = -1;
    let val = num;
    while (val >= 1000 && unitIndex < units.length - 1) {
      val /= 1000;
      unitIndex++;
    }
    return val.toFixed(decimals === 0 ? 1 : decimals) + units[unitIndex];
  }
};

const AudioSys = {
  // Simple synthesizer for sound effects (no external files needed)
  ctx: null,
  init() {
    window.AudioContext = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AudioContext();
  },
  play(type) {
    if (!Game.data.settings.sound) return;
    if (!this.ctx) this.init();
    
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);

    const now = this.ctx.currentTime;
    
    if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'buy') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(600, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'chime') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
      osc.start(now);
      osc.stop(now + 1.5);
    }
  }
};

// --- BOOT ---
window.addEventListener('DOMContentLoaded', () => Game.init());
